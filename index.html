<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BookLog</title>
<script src="https://accounts.google.com/gsi/client"></script>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #EEE5CE;
    --bg2: #E8DCC0;
    --surface: rgba(255,252,245,0.82);
    --surface2: rgba(240,232,215,0.7);
    --border: rgba(180,150,110,0.25);
    --border-strong: rgba(160,120,80,0.4);
    --text: #2C1F0E;
    --text-muted: #7A5C3A;
    --text-faint: #B89A72;
    --pink: #BA6759;
    --pink-light: #D4917F;
    --pink-bg: rgba(186,103,89,0.15);
    --pink-border: rgba(186,103,89,0.35);
    --green: #4A7C3F;
    --green-bg: rgba(74,124,63,0.12);
    --green-border: rgba(74,124,63,0.3);
    --blue: #3A6B9A;
    --blue-bg: rgba(58,107,154,0.1);
    --blue-border: rgba(58,107,154,0.3);
    --amber: #A0621A;
    --amber-bg: rgba(160,98,26,0.1);
    --amber-border: rgba(160,98,26,0.3);
    --red: #B03030;
    --radius: 8px;
    --radius-lg: 14px;
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  body {
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
    position: relative;
    overflow-x: hidden;
  }

  /* ── Cherry blossom SVG background ── */
  #sakura-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  /* ── Falling petals canvas ── */
  #petal-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  .container {
    max-width: 740px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
    position: relative;
    z-index: 2;
  }

  /* ── Header ── */
  .app-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .logo-wrap { display: flex; align-items: baseline; gap: 10px; }
  .app-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1;
  }
  .app-title span { color: var(--pink); }
  .app-kana {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
    margin-top: 4px;
  }
  .app-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .sync-status { font-size: 11px; color: var(--text-faint); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); }
  .sync-dot.synced { background: var(--green); }
  .sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* ── Stats ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 10px;
    margin-bottom: 1.75rem;
  }
  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 12px;
    backdrop-filter: blur(4px);
    text-align: center;
  }
  .stat-val { font-family: 'Noto Serif JP', serif; font-size: 26px; font-weight: 500; color: var(--text); }
  .stat-lbl { font-size: 10px; color: var(--text-muted); margin-top: 3px; letter-spacing: 0.06em; text-transform: uppercase; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 0; margin-bottom: 1.25rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; font-family: inherit; letter-spacing: 0.03em; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--pink); border-bottom-color: var(--pink); font-weight: 500; }

  /* ── Buttons ── */
  .btn {
    padding: 8px 18px; font-size: 13px; border: 1px solid var(--border-strong);
    border-radius: 50px; cursor: pointer; background: var(--surface);
    color: var(--text); font-family: inherit; letter-spacing: 0.03em;
    backdrop-filter: blur(4px); transition: background 0.15s;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--pink); color: #fff; border-color: var(--pink); }
  .btn-primary:hover { background: #9A4A3C; border-color: #9A4A3C; }
  .btn-sm { padding: 5px 14px; font-size: 12px; }
  .btn-danger { color: var(--red); border-color: rgba(176,48,48,0.35); background: none; border-radius: var(--radius); }
  .btn-danger:hover { background: rgba(176,48,48,0.08); }
  .btn-finish { background: var(--pink); color: #fff; border-color: var(--pink); }
  .btn-finish:hover { background: #9A4A3C; border-color: #9A4A3C; }
  .btn-reread { background: var(--surface2); color: var(--text-muted); border-color: var(--border-strong); }
  .btn-reread:hover { background: var(--border); }
  .badge-reread { background: rgba(160,98,26,0.12); color: var(--amber); border-color: rgba(160,98,26,0.3); }

  /* ── Book cards ── */
  .book-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
    margin-bottom: 10px;
    backdrop-filter: blur(6px);
    transition: border-color 0.15s, transform 0.1s;
  }
  .book-card:hover { border-color: var(--pink-border); transform: translateY(-1px); }
  .book-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .book-title { font-family: 'Noto Serif JP', serif; font-size: 15px; font-weight: 500; }
  .book-author { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .book-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; align-items: center; }
  .badge { font-size: 10px; padding: 3px 9px; border-radius: 50px; border: 0.5px solid; font-weight: 500; letter-spacing: 0.04em; }
  .badge-reading { background: var(--pink-bg); color: var(--pink); border-color: var(--pink-border); }
  .badge-done { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
  .badge-want { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-border); }
  .badge-paused { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-border); }
  .badge-neutral { background: rgba(180,150,110,0.12); color: var(--text-muted); border-color: var(--border); }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 10px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink-light), var(--pink)); border-radius: 2px; }
  .progress-label { font-size: 10px; color: var(--text-faint); margin-top: 4px; }
  .stars-display { color: var(--pink); font-size: 12px; }

  /* ── Empty ── */
  .empty { text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
  .empty-icon { font-size: 38px; margin-bottom: 12px; }

  /* ── Loading ── */
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; color: var(--text-muted); gap: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--pink); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Modals ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(44,31,14,0.45); z-index: 50; overflow-y: auto; padding: 2rem 1rem; }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: rgba(250,245,232,0.97);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 1.75rem;
    width: min(540px, 100%);
    position: relative;
    backdrop-filter: blur(10px);
  }
  .modal-title { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; letter-spacing: 0.03em; }
  .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); line-height: 1; padding: 2px 6px; border-radius: 4px; }
  .modal-close:hover { background: var(--surface2); }
  .modal-footer { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-top: 1.5rem; border-top: 0.5px solid var(--border); padding-top: 1.25rem; }

  /* ── Forms ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; }
  input, select, textarea {
    padding: 9px 11px; border: 1px solid var(--border-strong); border-radius: var(--radius);
    font-size: 14px; background: rgba(255,252,245,0.9); color: var(--text);
    font-family: inherit; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--pink); }
  textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  input.autofilled { border-color: var(--pink-border); background: var(--pink-bg); }

  /* ── Teacup rating ── */
  .cup-pick { display: flex; gap: 6px; }
  .cup-btn { font-size: 24px; cursor: pointer; background: none; border: none; line-height: 1; padding: 2px; filter: grayscale(1) opacity(0.35); transition: filter 0.15s, transform 0.15s; }
  .cup-btn:hover { transform: scale(1.15); }
  .cup-btn.on { filter: grayscale(0) opacity(1); }
  .cup-label { font-size: 11px; color: var(--text-muted); margin-top: 5px; min-height: 16px; font-style: italic; letter-spacing: 0.03em; }
  .stars-display { font-size: 13px; }

  /* ── Notes ── */
  .note-entry { background: rgba(242,184,205,0.1); border-left: 2px solid var(--pink-light); border-radius: 0 var(--radius) var(--radius) 0; padding: 10px 12px; margin-bottom: 8px; }
  .note-text { font-size: 13px; line-height: 1.6; }
  .note-date { font-size: 10px; color: var(--text-faint); margin-top: 4px; }
  .notes-header { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; margin: 12px 0 8px; }

  /* ── Error ── */
  .error-banner { background: rgba(176,48,48,0.08); border: 0.5px solid rgba(176,48,48,0.3); color: var(--red); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; }

  /* ── Search dropdown ── */
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input { padding-right: 36px; }
  .search-spinner { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; border: 2px solid var(--border); border-top-color: var(--pink); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .search-results { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: rgba(250,245,232,0.98); border: 1px solid var(--border-strong); border-radius: var(--radius); box-shadow: 0 6px 20px rgba(44,31,14,0.15); z-index: 100; max-height: 280px; overflow-y: auto; display: none; backdrop-filter: blur(10px); }
  .search-result { padding: 10px 14px; cursor: pointer; border-bottom: 0.5px solid var(--border); }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover, .search-result.highlighted { background: var(--pink-bg); }
  .sr-title { font-size: 14px; font-weight: 500; font-family: 'Noto Serif JP', serif; }
  .sr-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .sr-no-results { padding: 12px 14px; font-size: 13px; color: var(--text-muted); }

  .divider { display: flex; align-items: center; gap: 10px; margin: 4px 0 14px; color: var(--text-faint); font-size: 11px; letter-spacing: 0.05em; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

  @media (max-width: 500px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .app-title { font-size: 26px; }
  }

  /* ── Reports ── */
  .report-toggle { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .rtoggle { padding: 6px 18px; font-size: 13px; border: 1px solid var(--border-strong); border-radius: 50px; cursor: pointer; background: var(--surface); color: var(--text-muted); font-family: inherit; }
  .rtoggle.active { background: var(--pink); color: #fff; border-color: var(--pink); }
  .report-section { margin-bottom: 2rem; }
  .report-title { font-family: 'Noto Serif JP', serif; font-size: 15px; font-weight: 500; margin-bottom: 1rem; color: var(--text); letter-spacing: 0.03em; }
  .chart-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1rem 0.75rem; backdrop-filter: blur(6px); overflow-x: auto; }
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 160px; min-width: max-content; }
  .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
  .bar-outer { width: 32px; display: flex; align-items: flex-end; height: 130px; }
  .bar-inner { width: 100%; border-radius: 4px 4px 0 0; background: var(--pink); min-height: 3px; transition: height 0.4s ease; position: relative; cursor: default; }
  .bar-inner:hover { opacity: 0.8; }
  .bar-inner .bar-tip { display: none; position: absolute; top: -28px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); font-size: 11px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
  .bar-inner:hover .bar-tip { display: block; }
  .bar-label { font-size: 10px; color: var(--text-muted); text-align: center; white-space: nowrap; }
  .bar-val { font-size: 11px; color: var(--text-muted); }
  .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .report-stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; backdrop-filter: blur(4px); }
  .report-stat-val { font-family: 'Noto Serif JP', serif; font-size: 22px; font-weight: 500; }
  .report-stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
  .book-list-small { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; backdrop-filter: blur(6px); }
  .bls-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 0.5px solid var(--border); font-size: 13px; gap: 12px; }
  .bls-row:last-child { border-bottom: none; }
  .bls-title { font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bls-meta { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
  .empty-report { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 13px; }
  .year-select { padding: 5px 10px; font-size: 13px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface); color: var(--text); font-family: inherit; cursor: pointer; margin-left: auto; display: block; margin-bottom: 1rem; }

  .signin-screen {display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;position:relative;z-index:2;}
  .signin-card {background:rgba(250,245,232,0.92);border:0.5px solid var(--border-strong);border-radius:var(--radius-lg);padding:2.5rem 2rem;text-align:center;backdrop-filter:blur(10px);width:min(360px,90vw);}
  .signin-title {font-family:'Noto Serif JP',serif;font-size:28px;font-weight:600;margin-bottom:6px;}
  .signin-title span {color:var(--pink);}
  .signin-kana {font-size:13px;color:var(--text-faint);letter-spacing:0.15em;margin-bottom:1.5rem;font-family:'Noto Serif JP',serif;}
  .signin-sub {font-size:13px;color:var(--text-muted);margin-bottom:1.5rem;line-height:1.6;}
  .g-signin-btn {display:inline-flex;align-items:center;gap:10px;padding:10px 20px;background:white;border:1px solid var(--border-strong);border-radius:50px;cursor:pointer;font-size:14px;font-family:inherit;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1);}
  .g-signin-btn:hover {box-shadow:0 2px 8px rgba(0,0,0,0.15);}
</style>
</head>

<script>
function handleSignIn() {
  var btn = document.getElementById('signin-btn');
  if (btn) btn.disabled = true;
  var interval = setInterval(function() {
    if (typeof google !== 'undefined' && window._appReady) {
      clearInterval(interval);
      window._doSignIn();
    } else if (typeof google !== 'undefined' && !window._appReady) {
      // app script not loaded yet, wait
    } else {
      clearInterval(interval);
      alert('Google Sign-In failed to load. Please refresh the page and try again.');
      if (btn) btn.disabled = false;
    }
  }, 100);
  setTimeout(function() { clearInterval(interval); if(btn) btn.disabled=false; }, 5000);
}
</script>

<script>
// Early stub so onclick works before main script loads
function _doSignIn() {
  if (typeof google === 'undefined') {
    alert('Google Sign-In is still loading. Please try again in a moment.');
    return;
  }
  window._doSignIn();
}
</script>

<div class="container" id="main-app" style="display:none">
  <div class="app-header">
    <div>
      <div class="logo-wrap"><div class="app-title">Book<span>Log</span></div></div>
      <div class="app-kana">ブックログ</div>
      <div class="app-subtitle" id="subtitle"></div>
    </div>
    <div class="header-right">
      <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Ready</span></div>
      <button class="btn btn-primary" onclick="openAdd()">＋ Add book</button>
      <button class="btn btn-sm" onclick="signOut()" style="font-size:12px;color:var(--text-muted)">Sign out</button>
    </div>
  </div>
  <div id="error-banner" style="display:none" class="error-banner"></div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-done">0</div><div class="stat-lbl">Finished</div></div>
    <div class="stat"><div class="stat-val" id="s-pages">0</div><div class="stat-lbl">Pages read</div></div>
    <div class="stat"><div class="stat-val" id="s-reading">0</div><div class="stat-lbl">Reading now</div></div>
    <div class="stat"><div class="stat-val" id="s-want">0</div><div class="stat-lbl">Want to read</div></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('all',this)">All</button>
    <button class="tab" onclick="setTab('reading',this)">Reading</button>
    <button class="tab" onclick="setTab('done',this)">Finished</button>
    <button class="tab" onclick="setTab('want',this)">Want to read</button>
    <button class="tab" onclick="setTab('paused',this)">Paused</button>
    <button class="tab" onclick="setTab('reports',this)">Reports</button>
  </div>
  <div id="book-list"></div>
  <div id="reports-view" style="display:none"></div>
</div>

<!-- Add modal -->
<div class="modal-overlay" id="add-modal" onclick="bgClose(event,'add-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeAdd()">×</button>
    <div class="modal-title">Add a book</div>
    <div class="field" style="margin-bottom:6px">
      <label>Search by title</label>
      <div class="search-wrap">
        <input id="a-search" type="text" placeholder="Start typing a title…" autocomplete="off"
          oninput="onSearchInput()" onkeydown="onSearchKey(event)" onfocus="showDropdown()"/>
        <div class="search-spinner" id="search-spinner"></div>
        <div class="search-results" id="search-results"></div>
      </div>
    </div>
    <div class="divider">or fill in manually</div>
    <div class="form-grid">
      <div class="field"><label>Title *</label><input id="a-title" placeholder="Book title"/></div>
      <div class="field"><label>Author</label><input id="a-author" placeholder="Author name"/></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Total pages</label><input id="a-pages" type="number" min="1" placeholder="e.g. 320"/></div>
      <div class="field"><label>Genre</label><input id="a-genre" placeholder="e.g. Fantasy"/></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Published year</label><input id="a-year" type="number" placeholder="e.g. 2000"/></div>
      <div class="field"><label>Status</label>
        <select id="a-status">
          <option value="want">Want to read</option>
          <option value="reading">Currently reading</option>
          <option value="done">Finished</option>
          <option value="paused">Paused</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAdd()">Cancel</button>
      <button class="btn btn-primary" onclick="addBook()">Add book</button>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="edit-modal" onclick="bgClose(event,'edit-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeEdit()">×</button>
    <div class="modal-title" id="e-title"></div>
    <div id="e-author-sub" style="font-size:12px;color:var(--text-muted);margin-top:-1rem;margin-bottom:1.25rem"></div>
    <div class="form-grid">
      <div class="field"><label>Status</label>
        <select id="e-status" onchange="onStatusChange()">
          <option value="want">Want to read</option>
          <option value="reading">Currently reading</option>
          <option value="done">Finished</option>
          <option value="paused">Paused</option>
        </select>
      </div>
      <div class="field" id="e-pages-field"><label>Pages read</label><input id="e-pages" type="number" min="0"/></div>

      <div class="field"><label>Date started</label><input id="e-start" type="date"/></div>

        <button class="cup-btn" onclick="setRating(2)" title="2 cups">🍵</button>
        <button class="cup-btn" onclick="setRating(3)" title="3 cups">🍵</button>
        <button class="cup-btn" onclick="setRating(4)" title="4 cups">🍵</button>
        <button class="cup-btn" onclick="setRating(5)" title="5 cups">🍵</button>
      </div>
      <div class="cup-label" id="cup-label"></div>
    </div>
    <div class="field">
      <label>Add a note</label>
      <textarea id="e-note" placeholder="Thoughts, quotes, reflections…"></textarea>
    </div>
    <div id="e-saved-notes"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="deleteBook()" style="margin-right:auto">Delete book</button>
      <button class="btn" onclick="closeEdit()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>
<script>

  }
  window.addEventListener('resize', resize);
  resize();

  // Draw a pointed oval leaf with a midrib line — cherry blossom leaf shape
  function drawLeaf(ctx, x, y, w, h, angle, alpha, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.globalAlpha = alpha;

    // Leaf body: pointed at both ends, wider in the middle
    ctx.beginPath();
    ctx.moveTo(0, -h * 0.5);                          // tip top
    ctx.bezierCurveTo( w * 0.55, -h * 0.2,  w * 0.55,  h * 0.2,  0,  h * 0.5);  // right curve
    ctx.bezierCurveTo(-w * 0.55,  h * 0.2, -w * 0.55, -h * 0.2,  0, -h * 0.5);  // left curve
    ctx.fillStyle = color;
    ctx.fill();

    // Midrib
    ctx.beginPath();
    ctx.moveTo(0, -h * 0.45);
    ctx.lineTo(0,  h * 0.45);
    ctx.strokeStyle = 'rgba(180,100,120,0.35)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // 2–3 subtle veins
    ctx.strokeStyle = 'rgba(180,100,120,0.18)';
    ctx.lineWidth = 0.5;
    for (let v = -1; v <= 1; v += 2) {
      ctx.beginPath();
      ctx.moveTo(0, -h * 0.1);
      ctx.quadraticCurveTo(v * w * 0.35, h * 0.05, v * w * 0.45, h * 0.25);
      ctx.stroke();
    }

    ctx.restore();
  }

  const leafColors = ['#C97868','#BA6759','#D4917F','#BF6E60','#CC8070','#C47268'];

  function randomLeaf(fromTop) {
    const w = 9 + Math.random() * 10;
    return {
      x:          Math.random() * W * 1.3 - W * 0.15,
      y:          fromTop ? -30 - Math.random() * 120 : Math.random() * H,
      w,
      h:          w * (1.6 + Math.random() * 0.5),
      speed:      0.35 + Math.random() * 0.65,
      drift:      (Math.random() - 0.5) * 0.5,
      wobble:     Math.random() * Math.PI * 2,
      wobbleAmt:  0.25 + Math.random() * 0.45,
      wobbleSpeed:0.008 + Math.random() * 0.016,
      tilt:       (Math.random() - 0.5) * 0.04,   // slow tumble
      angle:      Math.random() * Math.PI * 2,
      alpha:      0.5 + Math.random() * 0.38,
      color:      leafColors[Math.floor(Math.random() * leafColors.length)],
    };
  }

  for (let i = 0; i < LEAF_COUNT; i++) leaves.push(randomLeaf(false));

  function animate() {
    ctx.clearRect(0, 0, W, H);
    for (const l of leaves) {
      l.wobble += l.wobbleSpeed;
      l.x += l.drift + Math.sin(l.wobble) * l.wobbleAmt;
      l.y += l.speed;
      l.angle += l.tilt;
      if (l.y > H + 40) Object.assign(l, randomLeaf(true));
      drawLeaf(ctx, l.x, l.y, l.w, l.h, l.angle, l.alpha, l.color);
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

const CLIENT_ID = '401187815051-fde1d4sod5q1v8voiupvj1vk5oivm15h.apps.googleusercontent.com';
const FOLDER_ID = '1bDSu-aAryE3stwzWWQU_mgG9aLCsnkQg';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_API = 'https://www.googleapis.com/drive/v3';
const UPLOAD_API = 'https://www.googleapis.com/upload/drive/v3';

let accessToken = null;
let fileId = '1Fblnfjomcgcj5fB3DuLxU_oekpvKQlVp';
let tokenClient = null;

function _doSignIn() {
  if (typeof google === 'undefined') {
    alert('Google Sign-In is still loading. Please wait a moment and try again.');
    return;
  }
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: async (resp) => {
        if (resp.error) { showError('Sign in failed: ' + resp.error); return; }
        accessToken = resp.access_token;
        document.getElementById('signin-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        await loadFromDrive();
      }
    });
  }
  tokenClient.requestAccessToken();
}
window._doSignIn = _doSignIn;

function signOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken);
  accessToken = null; books = [];
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('signin-screen').style.display = 'flex';
}

async function driveGet(fid) {
  const res = await fetch(DRIVE_API + '/files/' + fid + '?alt=media', {
    headers: { Authorization: 'Bearer ' + accessToken }
  });
  if (!res.ok) throw new Error('Drive read failed: ' + res.status);
  return await res.json();
}

async function driveSearch() {
  const q = encodeURIComponent("name='reading-log-data.json' and '" + FOLDER_ID + "' in parents");
  const res = await fetch(DRIVE_API + '/files?q=' + q + '&orderBy=createdTime+desc&pageSize=1&fields=files(id)', {
    headers: { Authorization: 'Bearer ' + accessToken }
  });
  if (!res.ok) throw new Error('Drive search failed');
  const data = await res.json();
  return data.files && data.files.length ? data.files[0].id : null;
}

async function driveSave(data) {
  const json = JSON.stringify(data);
  if (fileId) {
    const res = await fetch(UPLOAD_API + '/files/' + fileId + '?uploadType=media', {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: json
    });
    if (!res.ok) throw new Error('Drive update failed: ' + res.status);
  } else {
    const meta = { name: 'reading-log-data.json', parents: [FOLDER_ID] };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
    form.append('file', new Blob([json], {type:'application/json'}));
    const res = await fetch(UPLOAD_API + '/files?uploadType=multipart', {
      method: 'POST', headers: { Authorization: 'Bearer ' + accessToken }, body: form
    });
    if (!res.ok) throw new Error('Drive create failed: ' + res.status);
    const created = await res.json();
    fileId = created.id;
  }
}

async function loadFromDrive() {
  try {
    setSyncStatus('syncing', 'Loading…');
    const latestId = await driveSearch();
    if (latestId) fileId = latestId;
    books = await driveGet(fileId);
    setSyncStatus('synced', 'Synced');
  } catch(e) {
    console.error(e); setSyncStatus('error', 'Load failed');
    showError('Could not load from Drive: ' + e.message);
    books = [];
  }
  render();
}

async function saveToDrive() {
  if (isSaving) return;
  isSaving = true; setSyncStatus('syncing', 'Saving…');
  try {
    await driveSave(books);
    setSyncStatus('synced', 'Synced · ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    console.error(e); setSyncStatus('error', 'Save failed');
    showError('Could not save to Drive: ' + e.message);
  }
  isSaving = false;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

function setTab(t, el) {

function render() {
  const statusOrder = {reading:0,paused:1,want:2,done:3};
  const filtered = (tab==='all' ? [...books] : books.filter(b=>b.status===tab))
    .sort((a,b) => {
      if (tab==='all') { const so=(statusOrder[a.status]??9)-(statusOrder[b.status]??9); if(so!==0)return so; }
      return a.title.localeCompare(b.title);
    });
  const list = document.getElementById('book-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🌸</div><p>'+(tab==='all'?'No books yet — add your first one!':'Nothing here yet.')+'</p></div>';
  } else {
    list.innerHTML = filtered.map(b => {
      const pct = b.totalPages&&b.pagesRead ? Math.min(100,Math.round(b.pagesRead/b.totalPages*100)) : 0;
      const badgeCls = {reading:'badge-reading',done:'badge-done',want:'badge-want',paused:'badge-paused'}[b.status]||'badge-want';
      const badgeLbl = {reading:'Reading',done:'Finished',want:'Want to read',paused:'Paused'}[b.status]||b.status;
      const cups = b.rating ? '🍵'.repeat(b.rating) : '';
      return '<div class="book-card"><div class="book-row"><div style="flex:1;min-width:0">'+
        '<div class="book-title">'+esc(b.title)+'</div>'+
        '<div class="book-author">'+esc(b.author)+(b.year?' · '+fmtYear(b.year):'')+'</div>'+
        '<div class="book-meta">'+
          '<span class="badge '+badgeCls+'">'+badgeLbl+'</span>'+
          (b.totalPages?'<span class="badge badge-neutral">'+(b.pagesRead||0).toLocaleString()+' / '+b.totalPages.toLocaleString()+' pages</span>':'')+
          (b.genre?'<span class="badge badge-neutral">'+esc(b.genre)+'</span>':'')+
          (cups?'<span title="'+b.rating+' cup'+(b.rating!==1?'s':'')+'">'+cups+'</span>':'')+
          (b.startDate?'<span class="badge badge-neutral">Started '+b.startDate+'</span>':'')+
          (b.finishDate?'<span class="badge badge-neutral">Finished '+b.finishDate+'</span>':'')+
          (b.readCount&&b.readCount>1?'<span class="badge badge-reread">Read '+b.readCount+'×</span>':'')+
        '</div>'+
        (b.status==='reading'&&b.totalPages?'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="progress-label">'+pct+'% complete</div>':'')+
      '</div>'+
      '<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">'+
        (b.status==='want'?'<button class="btn btn-sm btn-finish" onclick="startReading(''+b.id+'')">▶ Start</button>':'')+
        ((b.status==='reading'||b.status==='paused')?'<button class="btn btn-sm btn-finish" onclick="openFinish(''+b.id+'')">✓ Finish</button>':'')+
        (b.status==='done'?'<button class="btn btn-sm btn-reread" onclick="openReread(''+b.id+'')">↺ Re-read</button>':'')+
        '<button class="btn btn-sm" onclick="openEdit(''+b.id+'')">Edit</button>'+
      '</div></div></div>';
    }).join('');
  }
  document.getElementById('s-done').textContent = books.filter(b=>b.status==='done').length;
  document.getElementById('s-pages').textContent = books.reduce((a,b)=>a+(b.pagesRead||0),0).toLocaleString();
  document.getElementById('s-reading').textContent = books.filter(b=>b.status==='reading').length;
  document.getElementById('s-want').textContent = books.filter(b=>b.status==='want').length;
  const fin = books.filter(b=>b.status==='done'&&b.finishDate).sort((a,b)=>b.finishDate.localeCompare(a.finishDate));
  document.getElementById('subtitle').textContent = fin.length ? 'Last finished: '+fin[0].title : books.length+' book'+(books.length!==1?'s':'')+' tracked';
}

function onSearchInput() {

  searchTimer = setTimeout(() => fetchBooks(q), 400);

async function fetchBooks(q) {
  document.getElementById('search-spinner').style.display = 'block';
  try {
    const url = 'https://openlibrary.org/search.json?title='+encodeURIComponent(q)+'&limit=7&fields=title,author_name,first_publish_year,number_of_pages_median,subject';
    const res = await fetch(url);
    const data = await res.json();
    searchResults = (data.docs||[]).map(d => ({
      title:d.title||'', author:(d.author_name||[])[0]||'',
      year:d.first_publish_year?String(d.first_publish_year):'',
      totalPages:d.number_of_pages_median||0, genre:(d.subject||[])[0]||''
    }));
    renderDropdown();
  } catch(e) {
    searchResults=[];
    const el=document.getElementById('search-results');
    el.innerHTML='<div class="sr-no-results">Search unavailable — fill in manually.</div>';
    el.style.display='block';
  } finally { document.getElementById('search-spinner').style.display='none'; }
}

function renderDropdown() {
  const el = document.getElementById('search-results');
  el.innerHTML = searchResults.length
    ? searchResults.map((r,i)=>'<div class="search-result" onmousedown="selectResult('+i+')"><div class="sr-title">'+esc(r.title)+'</div><div class="sr-meta">'+[r.author,r.year,r.totalPages?r.totalPages+' pages':''].filter(Boolean).join(' · ')+'</div></div>').join('')
    : '<div class="sr-no-results">No results found.</div>';
  el.style.display='block'; selectedIndex=-1;
}
function showDropdown() { if (searchResults.length) document.getElementById('search-results').style.display='block'; }
function hideDropdown() { document.getElementById('search-results').style.display='none'; selectedIndex=-1; }
function onSearchKey(e) {
  const items=document.querySelectorAll('#search-results .search-result');
  if(e.key==='ArrowDown'){e.preventDefault();selectedIndex=Math.min(selectedIndex+1,items.length-1);items.forEach((it,i)=>it.classList.toggle('highlighted',i===selectedIndex));}
  else if(e.key==='ArrowUp'){e.preventDefault();selectedIndex=Math.max(selectedIndex-1,0);items.forEach((it,i)=>it.classList.toggle('highlighted',i===selectedIndex));}
  else if(e.key==='Enter'&&selectedIndex>=0){e.preventDefault();selectResult(selectedIndex);}
  else if(e.key==='Escape') hideDropdown();
}
function selectResult(i) {
  const r=searchResults[i]; if(!r) return;
  const fill=(id,val)=>{const el=document.getElementById(id);el.value=val||'';el.classList.toggle('autofilled',!!val);};
  fill('a-title',r.title);fill('a-author',r.author);fill('a-pages',r.totalPages||'');fill('a-genre',r.genre);fill('a-year',r.year);
  document.getElementById('a-search').value=r.title;
  hideDropdown(); document.getElementById('a-status').focus();
}

function renderReports() {
  const el=document.getElementById('reports-view');
  const finished=books.filter(b=>b.status==='done'&&b.finishDate);
  if(!finished.length){el.innerHTML='<div class="empty-report">🌸 No finished books yet!</div>';return;}
  const totalPages=books.reduce((a,b)=>a+(b.pagesRead||0),0);
  const withPages=finished.filter(b=>b.totalPages);
  const avgPages=withPages.length?Math.round(withPages.reduce((a,b)=>a+b.totalPages,0)/withPages.length):0;
  const rated=finished.filter(b=>b.rating);
  const avgRating=rated.length?(rated.reduce((a,b)=>a+b.rating,0)/rated.length).toFixed(1):'—';
  const years=[...new Set(finished.map(b=>b.finishDate.slice(0,4)))].sort();
  const byYear={};
  finished.forEach(b=>{const y=b.finishDate.slice(0,4);byYear[y]=(byYear[y]||0)+1;});
  const byMonth=Array(12).fill(0);
  finished.filter(b=>b.finishDate.startsWith(String(selectedReportYear))).forEach(b=>{byMonth[parseInt(b.finishDate.slice(5,7))-1]++;});
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const recent=[...finished].sort((a,b)=>b.finishDate.localeCompare(a.finishDate)).slice(0,8);
  const byGenre={};
  finished.forEach(b=>{if(b.genre)byGenre[b.genre]=(byGenre[b.genre]||0)+1;});
  const topGenres=Object.entries(byGenre).sort((a,b)=>b[1]-a[1]).slice(0,5);
  function barChart(data,labels){
    const max=Math.max(...data,1);
    return '<div class="chart-wrap"><div class="bar-chart">'+data.map((v,i)=>
      '<div class="bar-col"><div class="bar-outer"><div class="bar-inner" style="height:'+Math.round((v/max)*120)+'px">'+
      (v>0?'<span class="bar-tip">'+v+' book'+(v!==1?'s':'')+'</span>':'')+
      '</div></div><div class="bar-label">'+labels[i]+'</div></div>').join('')+'</div></div>';
  }
  const yearLabels=Object.keys(byYear).sort();
  const yearVals=yearLabels.map(y=>byYear[y]);
  const yearOptions=years.map(y=>'<option value="'+y+'"'+(y==selectedReportYear?' selected':'')+'>'+y+'</option>').join('');
  el.innerHTML=
    '<div class="report-grid">'+
      '<div class="report-stat"><div class="report-stat-val">'+finished.length+'</div><div class="report-stat-lbl">Books finished</div></div>'+
      '<div class="report-stat"><div class="report-stat-val">'+totalPages.toLocaleString()+'</div><div class="report-stat-lbl">Pages read</div></div>'+
      '<div class="report-stat"><div class="report-stat-val">'+(avgPages||'—')+'</div><div class="report-stat-lbl">Avg pages / book</div></div>'+
      '<div class="report-stat"><div class="report-stat-val">'+(avgRating!=='—'?'🍵'.repeat(Math.round(avgRating)):'—')+'</div><div class="report-stat-lbl">Avg rating</div></div>'+
    '</div>'+
    '<div class="report-section"><div class="report-title">Books finished per year</div>'+
      (yearLabels.length>1?barChart(yearVals,yearLabels):'<div class="chart-wrap" style="padding:1rem;font-size:13px;color:var(--text-muted)">Only one year of data so far.</div>')+
    '</div>'+
    '<div class="report-section"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">'+
      '<div class="report-title" style="margin-bottom:0">Books per month</div>'+
      '<select class="year-select" style="margin:0" onchange="selectedReportYear=parseInt(this.value);renderReports()">'+yearOptions+'</select>'+
    '</div>'+barChart(byMonth,monthNames)+'</div>'+
    (topGenres.length?'<div class="report-section"><div class="report-title">Top genres</div><div class="book-list-small">'+
      topGenres.map(([g,c])=>'<div class="bls-row"><div class="bls-title">'+esc(g)+'</div><div class="bls-meta">'+c+' book'+(c!==1?'s':'')+'</div></div>').join('')+
    '</div></div>':'')+
    '<div class="report-section"><div class="report-title">Recently finished</div><div class="book-list-small">'+
      recent.map(b=>'<div class="bls-row"><div class="bls-title">'+esc(b.title)+'</div><div class="bls-meta">'+(b.rating?'🍵'.repeat(b.rating)+' · ':'')+b.finishDate+'</div></div>').join('')+
    '</div></div>';
}

window._appReady = true;

document.addEventListener('click', e => {
  if(!document.getElementById('a-search').contains(e.target)&&!document.getElementById('search-results').contains(e.target)) hideDropdown();
});
</script>
</body>
</html>
